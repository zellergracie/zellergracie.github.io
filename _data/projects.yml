- title: One-to-one correspondence in children and macaques
  year: 2026
  description: "We found that cardinal principle knowledge is neither necessary nor sufficient to use one-to-one correspondence cues to make precise quantity discriminations. This challenges most existing accounts of how children learn the relationship between one-to-one correspondence and numerical equality."
