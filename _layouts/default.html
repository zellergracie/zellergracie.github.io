<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ page.title | default: site.title }}</title>
  <meta property="og:title" content="Gracie Zeller"/>
  <meta property="og:description" content="Laboratory manager at UW-Madison"/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="zellergracie.github.io"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf8f4;
      --text: #2d2418;
      --muted: #5c544a;
      --border: #d9cfc0;
      --border-light: #e8e0d4;
    }

    body.dark {
      --bg: #0f0f0f;
      --text: #e8e2d8;
      --muted: #a89e92;
      --border: #2a2520;
      --border-light: #1e1a17;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 1rem;
      line-height: 1.8;
      transition: background 0.3s ease, color 0.3s ease;
    }

    .container {
      max-width: 85ch;
      margin: 0 auto;
      padding: 0 2rem;
    }

    nav {
      padding: 3rem 0 0;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      opacity: 0;
      animation: fadeIn 0.5s ease forwards 0.05s;
    }

    .nav-name { font-weight: 700; }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
      align-items: baseline;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--muted);
      border-bottom: 1px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }

    .nav-links a:hover { color: var(--text); border-color: var(--border); }

    #theme-toggle {
      background: none;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      transition: opacity 0.15s, filter 0.15s;
    }
    
    #theme-toggle:hover { opacity: 0.6; }
    
    body.dark #theme-toggle {
      filter: invert(1) brightness(0.8);
    }

    .hero {
      padding: 4rem 0 3rem;
      opacity: 0;
      animation: fadeIn 0.5s ease forwards 0.15s;
    }

    .hero p { color: var(--muted); margin-bottom: 0.3rem; }
    .hero p strong { color: var(--text); font-weight: 700; }

    .hero a {
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      transition: border-color 0.15s;
    }

    .hero a:hover { border-color: var(--text); }

    .divider { height: 1px; background: var(--border); }

    section {
      padding: 2.5rem 0;
      opacity: 0;
      animation: fadeIn 0.5s ease forwards;
    }

    section:nth-of-type(1) { animation-delay: 0.25s; }
    section:nth-of-type(2) { animation-delay: 0.32s; }
    section:nth-of-type(3) { animation-delay: 0.39s; }
    section:nth-of-type(4) { animation-delay: 0.46s; }

    .section-label {
      color: var(--muted);
      font-style: italic;
      margin-bottom: 1.4rem;
    }

    .work-item {
      display: grid;
      grid-template-columns: 1fr auto;
      column-gap: 2rem;
      padding: 0.7rem 0;
      text-decoration: none;
      color: inherit;
    }

    .work-item:first-child { border-top: 1px solid var(--border-light); }

    .work-desc {
      display: block;
      color: var(--muted);
      font-size: 0.9rem;
      grid-column: 1 / -1;
      padding-bottom: 0.4rem;
    }

    .work-desc a {
      color: var(--text);
      border-bottom: 1px solid var(--border);
      text-decoration: none;
    }

    .work-year { color: var(--muted); white-space: nowrap; font-style: italic; }

    .cv-link {
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      transition: border-color 0.15s;
    }

    .cv-link:hover { border-color: var(--text); }

    .contact-links { display: flex; flex-direction: column; gap: 0.4rem; }

    .contact-links a {
      color: var(--muted);
      text-decoration: none;
      width: fit-content;
      border-bottom: 1px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }

    .contact-links a:hover { color: var(--text); border-color: var(--border); }

    footer { padding: 2rem 0 3rem; color: #b0a898; font-size: 0.75rem; }

    @keyframes fadeIn { to { opacity: 1; } }

    @media (max-width: 480px) {
      nav { flex-direction: column; gap: 0.8rem; }
      .hero-inner { flex-direction: column-reverse; }
      .hero-inner img { width: 80px; height: 80px; }
    }
  </style>
</head>
<body>
<div class="container">

  <nav>
    <span class="nav-name">Gracie Zeller</span>
    <ul class="nav-links">
      <li><a href="#work">projects</a></li>
      <li><a href="#cv">cv</a></li>
      <li><a href="#contact">contact</a></li>
      <li><button id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">☾</button></li>    </ul>
  </nav>

  {{ content }}

  <footer>© 2026 Gracie Zeller</footer>

</div>
<script>
  function toggleTheme() {
    const isDark = document.body.classList.toggle('dark');
    document.getElementById('theme-toggle').textContent = isDark ? '𖤓' : '☾';
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
  }

  if (localStorage.getItem('theme') === 'dark') {
    document.body.classList.add('dark');
    document.getElementById('theme-toggle').textContent = '𖤓';
  }
</script>
</body>
</html>
